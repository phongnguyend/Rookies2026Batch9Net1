
trigger: none

variables: 
  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:

- stage: DotNetBuild
  displayName: .Net Build
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
      - task: UseDotNet@2
        displayName: Use .Net 10.0.x
        inputs:
          packageType: 'sdk'
          version: '10.0.x'
      - task: DotNetCoreCLI@2
        displayName: dotnet restore
        inputs:
          command: 'restore'
          projects: 'API/AssetManagement/AssetManagement.sln'
          feedsToUse: 'select'
      - task: DotNetCoreCLI@2
        displayName: dotnet list package --vulnerable
        inputs:
          command: 'custom'
          custom: 'list'
          arguments: 'package --vulnerable'
          workingDirectory: 'API/AssetManagement'
      - task: DotNetCoreCLI@2
        displayName: Build
        inputs:
          command: 'build'
          arguments: '--configuration Release'
          workingDirectory: 'API/AssetManagement'
      - task: DotNetCoreCLI@2
        displayName: Test
        inputs:
          command: 'test'
          projects: |
            API/AssetManagement/AssetManagement.Test/*.csproj
          arguments: '/p:CollectCoverage=true /p:CoverletOutputFormat=cobertura "/p:Include=\"[AssetManagement.Api]*,[AssetManagement.Domain]*\""'
      - task: PublishCodeCoverageResults@2
        displayName: 'Publish Code Coverage'
        inputs:
          summaryFileLocation: '$(Build.SourcesDirectory)/**/*.cobertura.xml'
      - task: DotNetCoreCLI@2
        displayName: Publish
        inputs:
          command: 'publish'
          publishWebProjects: false
          projects: |
            API/AssetManagement/AssetManagement.Api/*.csproj
          arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'

