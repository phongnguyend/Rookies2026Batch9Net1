parameters:
- name: serviceConnection
  type: string
- name: appName
  type: string
- name: resourceGroupName
  type: string

steps:
- task: AzureAppServiceSettings@1
  displayName: 'Configure App Service Settings'
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    appName: ${{ parameters.appName }}
    resourceGroupName: ${{ parameters.resourceGroupName }}
    appSettings: |
      [
        {
          "name": "Jwt__Issuer",
          "value": "$(Jwt__Issuer)"
        },
        {
          "name": "Jwt__Audience",
          "value": "$(Jwt__Audience)"
        },
        {
          "name": "Jwt__SecretKey",
          "value": "$(Jwt__SecretKey)"
        },
        {
          "name": "Jwt__AccessTokenExpiryInMilliseconds",
          "value": "$(Jwt__AccessTokenExpiryInMilliseconds)"
        },
        {
          "name": "Jwt__RefreshTokenExpiryInMilliseconds",
          "value": "$(Jwt__RefreshTokenExpiryInMilliseconds)"
        },
        {
          "name": "Cors__AllowedOrigins__0",
          "value": "$(Cors__AllowedOrigins__0)"
        },
        {
          "name": "Cors__AllowedOrigins__1",
          "value": "$(Cors__AllowedOrigins__1)"
        },
      ]