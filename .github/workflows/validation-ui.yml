name: Validation UI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'Frontend/**'

jobs:
  build:
    name: Build ReactJs
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_ACCESS_SESSION_COOKIE_NAME: ${{ secrets.NEXT_PUBLIC_ACCESS_SESSION_COOKIE_NAME }}
      NEXT_PUBLIC_REFRESH_SESSION_COOKIE_NAME: ${{ secrets.NEXT_PUBLIC_REFRESH_SESSION_COOKIE_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 24.x
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: npm install
        run: npm install
        working-directory: Frontend

      - name: npm audit --audit-level=critical
        run: npm audit --audit-level=critical
        working-directory: Frontend

      - name: run build
        run: npm run build
        working-directory: Frontend
