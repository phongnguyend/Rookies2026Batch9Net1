name: Validation API

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'Backend/**'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use .NET 10.0.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: dotnet restore
        run: dotnet restore Backend/NashAssetManagement/NashAssetManagement.slnx

      - name: dotnet list package --vulnerable
        run: dotnet list package --vulnerable
        working-directory: Backend/NashAssetManagement

      - name: Build
        run: dotnet build --configuration Release
        working-directory: Backend/NashAssetManagement

      - name: Test
        run: >
          dotnet test
          Backend/NashAssetManagement/tests/NashAssetManagement.UnitTests/NashAssetManagement.UnitTests.csproj
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          "/p:Include=\"[NashAssetManagement.Application]*,[NashAssetManagement.Domain]*\""

      - name: Publish Code Coverage
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: '**/*.cobertura.xml'

      - name: Publish
        run: >
          dotnet publish
          Backend/NashAssetManagement/src/NashAssetManagement.WebAPI/NashAssetManagement.WebAPI.csproj
          --configuration Release
          --output ${{ github.workspace }}/publish
