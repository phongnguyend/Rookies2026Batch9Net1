services:
  # Nash Asset Management Database
  nam-db:
    container_name: nam-db
    image: mcr.microsoft.com/mssql/server:2025-latest
    restart: always
    ports:
      - "1433:1433"
    volumes:
      - nam-db-data:/var/opt/mssql
    environment:
      - ACCEPT_EULA=Y
    env_file:
      - path: secrets/nam-db.env
        required: true
    networks:
      - nam-network
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -C -Q 'SELECT 1' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  nam-db-data:


networks:
  nam-network:
    driver: bridge
